<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" rx="32" fill="#FBF7F2"/>
  <rect x="56" y="56" width="1088" height="588" rx="26" fill="#FFFDFB" stroke="#E5D8CA"/>
  <text x="84" y="108" fill="#2B1D16" font-size="30" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Sisler Bulvari Cafe interface map</text>
  <text x="84" y="140" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">The public repository is centered on screens, navigation, and the accompanying data model.</text>

  <rect x="84" y="194" width="280" height="156" rx="24" fill="#FFF3E7" stroke="#E9C39E"/>
  <text x="114" y="232" fill="#8B5A2B" font-size="17" font-weight="700" font-family="Arial, Helvetica, sans-serif">Customer flow</text>
  <text x="114" y="270" fill="#2B1D16" font-size="30" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Order screen</text>
  <text x="114" y="302" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">Browse menu items</text>
  <text x="114" y="328" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">Capture table number</text>
  <text x="114" y="354" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">Review a simple basket</text>

  <rect x="460" y="194" width="280" height="156" rx="24" fill="#2D1D15"/>
  <text x="490" y="232" fill="#FFD7B1" font-size="17" font-weight="700" font-family="Arial, Helvetica, sans-serif">Operations flow</text>
  <text x="490" y="270" fill="#FFF7ED" font-size="30" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Admin pages</text>
  <text x="490" y="302" fill="#F4DFCF" font-size="18" font-family="Arial, Helvetica, sans-serif">Login</text>
  <text x="570" y="302" fill="#F4DFCF" font-size="18" font-family="Arial, Helvetica, sans-serif">Orders</text>
  <text x="490" y="328" fill="#F4DFCF" font-size="18" font-family="Arial, Helvetica, sans-serif">Menu</text>
  <text x="570" y="328" fill="#F4DFCF" font-size="18" font-family="Arial, Helvetica, sans-serif">Statistics</text>
  <text x="490" y="354" fill="#F4DFCF" font-size="18" font-family="Arial, Helvetica, sans-serif">Home shell</text>

  <rect x="836" y="194" width="280" height="156" rx="24" fill="#FFF3E7" stroke="#E9C39E"/>
  <text x="866" y="232" fill="#8B5A2B" font-size="17" font-weight="700" font-family="Arial, Helvetica, sans-serif">Data layer</text>
  <text x="866" y="270" fill="#2B1D16" font-size="30" font-weight="700" font-family="Georgia, 'Times New Roman', serif">MySQL schema</text>
  <text x="866" y="302" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">`cafe-database-schema.sql`</text>
  <text x="866" y="328" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">orders, products,</text>
  <text x="866" y="354" fill="#6B5A4A" font-size="18" font-family="Arial, Helvetica, sans-serif">and sales records</text>

  <path d="M364 272H432" stroke="#B8743C" stroke-width="5" stroke-linecap="round"/>
  <path d="M740 272H808" stroke="#B8743C" stroke-width="5" stroke-linecap="round"/>
  <circle cx="398" cy="272" r="9" fill="#B8743C"/>
  <circle cx="774" cy="272" r="9" fill="#B8743C"/>

  <rect x="182" y="430" width="836" height="140" rx="26" fill="#FFFDFB" stroke="#E5D8CA"/>
  <text x="214" y="470" fill="#2B1D16" font-size="22" font-weight="700" font-family="Arial, Helvetica, sans-serif">Project positioning</text>
  <text x="214" y="507" fill="#6B5A4A" font-size="19" font-family="Arial, Helvetica, sans-serif">The report frames the system as a digital alternative to manual ordering during peak hours, supported by admin-side views</text>
  <text x="214" y="537" fill="#6B5A4A" font-size="19" font-family="Arial, Helvetica, sans-serif">for orders, menu changes, and simple sales analytics. The public repo snapshot mainly preserves those screens and the schema.</text>

  <text x="84" y="620" fill="#8A7968" font-size="16" font-family="Arial, Helvetica, sans-serif">Repository note: the public codebase is strongest as an interface delivery and case-study artifact for the cafe project.</text>
</svg>
