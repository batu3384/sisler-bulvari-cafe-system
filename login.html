<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisler Bulvarı Kafe - Yönetici Girişi</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-form {
            width: 100%;
            max-width: 340px;
            background-color: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .login-form h2 {
            margin-top: 0;
            color: #007bff;
        }

        .login-form input {
            width: 100%;
            margin: 10px 0;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .login-form button {
            width: 100%;
            margin-top: 10px;
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }

        .login-form button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form" id="login-form">
            <h2>Sisler Bulvarı Kafe Yönetici Girişi</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="adminLogin()">Gönder</button>
        </div>
    </div>

    <script>
        function adminLogin() {
            alert("Bu ekran, proje teslimindeki yönetici giriş prototipini gösterir.");
        }
    </script>
</body>
</html>
