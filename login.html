<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisler Bulvarı Cafe - Yönetici Girişi</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            background-color: #f4f6f9;
            color: #243447;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-form {
            width: 100%;
            max-width: 360px;
            background-color: #fff;
            padding: 26px;
            border-radius: 14px;
            border: 1px solid #d9e0ea;
            box-shadow: 0 12px 28px rgba(14, 36, 58, 0.08);
            text-align: center;
        }

        .login-form h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #1e88e5;
        }

        .login-form p {
            margin: 0 0 18px;
            color: #667788;
            line-height: 1.5;
        }

        .login-form input {
            width: 100%;
            margin: 10px 0;
            padding: 11px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .login-form button {
            width: 100%;
            margin-top: 10px;
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }

        .login-form button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form" id="login-form">
            <h2>Sisler Bulvarı Cafe Yönetici Girişi</h2>
            <p>Bu yüzey, proje teslimindeki yönetici giriş adımını statik olarak temsil eder.</p>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="adminLogin()">Gönder</button>
        </div>
    </div>

    <script>
        function adminLogin() {
            alert("Bu ekran, proje teslimindeki yönetici giriş prototipini gösterir.");
        }
    </script>
</body>
</html>
