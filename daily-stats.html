<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisler Bulvarı Cafe - Günlük İstatistikler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar">
                <h5 class="text-center">Sisler Bulvarı Cafe</h5>
                <a href="index.html">Anasayfa</a>
                <a href="menu.html">Menü</a>
                <a href="orders.html">Siparişler</a>
                <a href="daily-stats.html" class="active">Günlük İstatistikler</a>
                <a href="monthly-stats.html">Aylık İstatistikler</a>
                <a href="most-popular.html">En Beğenilenler</a>
            </nav>

            <main class="col-md-10 content">
                <div class="mb-4">
                    <h3 class="mb-2">Günlük İstatistikler</h3>
                    <p class="text-muted mb-0">
                        Gün içindeki ürün bazlı hareketi hızlıca göstermek için hazırlanmış örnek günlük satış görünümü.
                    </p>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div style="height: 360px;">
                            <canvas id="dailyStatsChart"></canvas>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const dailyCtx = document.getElementById("dailyStatsChart").getContext("2d");
        new Chart(dailyCtx, {
            type: "bar",
            data: {
                labels: ["Türk Kahvesi", "Serpme Kahvaltı", "Magnolia", "Limonata", "Karışık Tost"],
                datasets: [{
                    label: "Satış Adedi",
                    data: [46, 18, 25, 22, 19],
                    backgroundColor: "rgba(30, 136, 229, 0.22)",
                    borderColor: "rgba(30, 136, 229, 1)",
                    borderWidth: 1.5,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
